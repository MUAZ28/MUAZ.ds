<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohammad Muaz Mohiuddin - Academic Hub</title>
    <style>
        :root {
            --bg-dark: #0b0f19;
            --card-dark: #111827;
            --accent-glow: #38bdf8;
            --text-bright: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #1f2937;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            color: var(--text-bright);
            background-color: var(--bg-dark);
            margin: 0;
            padding: 0;
        }

        .profile-banner {
            background: radial-gradient(circle at top right, #1e293b, var(--bg-dark));
            border-bottom: 1px solid var(--border-color);
            padding: 60px 20px;
            text-align: center;
            position: relative;
        }

        .profile-banner::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 3px;
            background: var(--accent-glow);
            box-shadow: 0 0 15px var(--accent-glow);
            border-radius: 2px;
        }

        .banner-content max-width: 900px; margin: 0 auto; { }

        .banner-content h1 {
            margin: 0 0 10px 0;
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #ffffff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .programme {
            font-size: 1.1rem;
            color: var(--accent-glow);
            margin-bottom: 30px;
            font-weight: 500;
        }

        .academic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            max-width: 900px;
            margin: 0 auto;
        }

        .grid-item {
            background: var(--card-dark);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            text-align: left;
        }

        .grid-item strong {
            color: var(--text-muted);
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .layout-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .manager-panel {
            background: linear-gradient(145deg, #111827, #1f2937);
            border: 1px solid #374151;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .manager-panel h3 { margin-top: 0; font-size: 1.3rem; }

        label {
            display: block;
            margin-top: 15px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #d1d5db;
        }

        select, textarea, input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: #0b0f19;
            color: white;
            font-family: inherit;
        }

        select:focus, textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-glow);
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.2);
        }

        .btn-submit {
            background-color: var(--accent-glow);
            color: #0b0f19;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        .chapter-list { display: flex; flex-direction: column; gap: 25px; }

        .chapter-card {
            background: var(--card-dark);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            transition: border-color 0.3s;
        }

        .chapter-card:hover {
            border-color: #374151;
        }

        .chapter-card h2 {
            margin-top: 0;
            font-size: 1.4rem;
            letter-spacing: -0.03em;
            color: white;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .chapter-content {
            white-space: pre-wrap;
            color: #d1d5db;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .pdf-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: var(--accent-glow);
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .pdf-badge:hover {
            background: rgba(56, 189, 248, 0.2);
        }

        .no-pdf {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .btn-clear {
            background: transparent;
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 20px;
        }
        
        .btn-clear:hover { background: rgba(239, 68, 68, 0.1); }

        @media print { .manager-panel, .btn-clear { display: none; } }
    </style>
</head>
<body>

    <header class="profile-banner">
        <div class="banner-content">
            <h1>Mohammad Muaz Mohiuddin</h1>
            <div class="programme">Bachelor of Electronics Engineering with Honours (Mechatronics)</div>
            
            <div class="academic-grid">
                <div class="grid-item"><strong>Student ID</strong>B122510871</div>
                <div class="grid-item"><strong>Course Code</strong>BERR1233</div>
                <div class="grid-item"><strong>University</strong>UTeM</div>
                <div class="grid-item"><strong>Lecturer</strong>Dr. Nurul Fajar</div>
            </div>
        </div>
    </header>

    <div class="layout-container">

        <div class="manager-panel">
            <h3>Update Chapter Workspace</h3>
            
            <label for="chapter-select">Select Target Module:</label>
            <select id="chapter-select">
                <option value="0">Chapter 1: Introduction to Data Structures</option>
                <option value="1">Chapter 2: Fundamentals of C++</option>
                <option value="2">Chapter 3: Arrays</option>
                <option value="3">Chapter 4: Abstract Data Types</option>
                <option value="4">Chapter 5: Stack</option>
                <option value="5">Chapter 6: Queue</option>
                <option value="7">Chapter 7: Sorting Algorithms</option>
                <option value="8">Chapter 8: Searching Algorithms</option>
                <option value="9">Chapter 9: Linked List</option>
                <option value="10">Chapter 10: Tree</option>
            </select>

            <label for="chapter-body">Slide Notes / Code Implementations:</label>
            <textarea id="chapter-body" rows="5" placeholder="Type notes or code snippets here..."></textarea>

            <label for="pdf-name">PDF File Name (e.g., chapter1.pdf):</label>
            <input type="text" id="pdf-name" placeholder="Leave empty if no file attached">
            
            <button class="btn-submit" onclick="saveChapterData()">Update Dashboard</button>
        </div>

        <div class="chapter-list" id="portfolio-container"></div>

    </div>

    <script>
        const systemChapters = [
            { id: 0, heading: "Chapter 1: Introduction to Data Structures", placeholder: "Notes setup pending configuration." },
            { id: 1, heading: "Chapter 2: Fundamentals of C++", placeholder: "Notes setup pending configuration." },
            { id: 2, heading: "Chapter 3: Arrays", placeholder: "Notes setup pending configuration." },
            { id: 3, heading: "Chapter 4: Abstract Data Types", placeholder: "Notes setup pending configuration." },
            { 
                id: 4, 
                heading: "Chapter 5: Stack", 
                placeholder: "A Stack is a linear data structure operating on the Last-In, First-Out (LIFO) paradigm.\n\nCore Stack Operations:\n• Push: Appends elements.\n• Pop: Removes items."
            },
            { id: 5, heading: "Chapter 6: Queue", placeholder: "Notes setup pending configuration." },
            { id: 7, heading: "Chapter 7: Sorting Algorithms", placeholder: "Notes setup pending configuration." },
            { id: 8, heading: "Chapter 8: Searching Algorithms", placeholder: "Notes setup pending configuration." },
            { id: 9, heading: "Chapter 9: Linked List", placeholder: "Notes setup pending configuration." },
            { id: 10, heading: "Chapter 10: Tree", placeholder: "Notes setup pending configuration." }
        ];

        let userContent = JSON.parse(localStorage.getItem('muaz_portfolio_records')) || {};

        function renderPortfolioDisplay() {
            const wrapper = document.getElementById('portfolio-container');
            wrapper.innerHTML = '';

            systemChapters.forEach(chap => {
                const dataObj = userContent[chap.id] || { text: chap.placeholder, pdf: "" };
                const isCustom = !!userContent[chap.id];

                let pdfHTML = `<span class="no-pdf">No document attachment linked</span>`;
                if (dataObj.pdf) {
                    pdfHTML = `<a href="${dataObj.pdf}" target="_blank" class="pdf-badge">📄 View Attached Resource (${dataObj.pdf})</a>`;
                }

                wrapper.innerHTML += `
                    <div class="chapter-card">
                        <h2>${chap.heading}</h2>
                        <div class="chapter-content">${escapeHTML(dataObj.text)}</div>
                        <div style="margin-top: 15px;">${pdfHTML}</div>
                        ${isCustom ? `<button class="btn-clear" onclick="clearTargetBlock(${chap.id})">Clear Section Updates</button>` : ''}
                    </div>
                `;
            });
        }

        function saveChapterData() {
            const selectorIndex = document.getElementById('chapter-select').value;
            const textInput = document.getElementById('chapter-body').value;
            const pdfInput = document.getElementById('pdf-name').value.trim();

            if(!textInput.trim() && !pdfInput) {
                alert('Please provide either text logs or a PDF reference path.');
                return;
            }

            userContent[selectorIndex] = {
                text: textInput.trim() ? textInput : (systemChapters.find(c => c.id == selectorIndex).placeholder),
                pdf: pdfInput
            };

            localStorage.setItem('muaz_portfolio_records', JSON.stringify(userContent));
            
            document.getElementById('chapter-body').value = '';
            document.getElementById('pdf-name').value = '';
            renderPortfolioDisplay();
        }

        function clearTargetBlock(targetId) {
            if(confirm('Reset changes made to this module?')) {
                delete userContent[targetId];
                localStorage.setItem('muaz_portfolio_records', JSON.stringify(userContent));
                renderPortfolioDisplay();
            }
        }

        function escapeHTML(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        renderPortfolioDisplay();
    </script>
</body>
</html>
